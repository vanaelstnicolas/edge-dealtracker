name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend server
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --app-dir backend > backend.log 2>&1 &

      - name: Wait for backend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready"
          cat backend.log
          exit 1

      - name: Smoke check health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/health)
          test "$code" = "200"

      - name: Smoke check protected endpoint without token
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/deals)
          test "$code" = "401"

  business-e2e-smoke:
    name: Business E2E Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run business smoke journey tests
        working-directory: backend
        run: pytest tests/test_business_smoke_paths.py -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
